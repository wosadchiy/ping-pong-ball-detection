[tool.taskipy.tasks]
clean = "echo [CLEAN] Starting... & (if exist dist rd /s /q dist) & (if exist build rd /s /q build) & (if exist *.spec del /q *.spec) & echo [OK] Cleaned."

dev = "python main.py"

# Сборка для отладки (с консолью)
buildDev = "task clean && pyinstaller --noconfirm --onedir --console --name BallTracker_Debug --clean main.py && copy settings.json dist\\BallTracker_Debug\\settings.json"

# Сборка для работы (без консоли)
buildProd = "task clean && pyinstaller --noconfirm --onedir --windowed --name BallTrackerPro --clean main.py && copy settings.json dist\\BallTrackerPro\\settings.json"